<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>go-snappymail</title>
  <style>
    :root { --bg: #48525c; --panel: rgba(0,0,0,.55); --text: #eee; --accent: #57a8ff; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: grid; place-items: center; }
    .card { width: min(420px, 92vw); background: var(--panel); padding: 2rem; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,.35); }
    h1 { margin: 0 0 .25rem; font-size: 1.5rem; }
    p.sub { margin: 0 0 1.5rem; opacity: .75; font-size: .9rem; }
    label { display: block; margin-bottom: .35rem; font-size: .85rem; }
    input { width: 100%; padding: .65rem .75rem; margin-bottom: 1rem; border: 1px solid #666; border-radius: 4px; background: #2a3038; color: #fff; }
    button { width: 100%; padding: .75rem; border: 0; border-radius: 4px; background: var(--accent); color: #111; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .6; cursor: wait; }
    .msg { margin-top: 1rem; font-size: .9rem; min-height: 1.2em; }
    .ok { color: #7dffa3; }
    .err { color: #ff8a8a; }
    .badge { display: inline-block; background: #333; padding: .15rem .5rem; border-radius: 4px; font-size: .75rem; margin-bottom: 1rem; }
    .hint { margin-top: 1rem; font-size: .75rem; opacity: .65; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">P0 — IMAP login</span>
    <h1>go-snappymail</h1>
    <p class="sub">Self-hosted webmail with SnappyMail-inspired UX</p>
    <form id="login">
      <label for="username">Email address</label>
      <input id="username" name="username" type="email" required placeholder="user@test.local" autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />
      <button type="submit" id="btn">Sign in</button>
    </form>
    <div class="msg" id="msg"></div>
    <p class="hint">Lab accounts: user@test.local, alice@test.local, ceo@acme.local — see docker/LAB_ACCOUNTS.md</p>
  </div>
  <script>
    function csrfToken() {
      const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
      return m ? decodeURIComponent(m[1]) : '';
    }
    fetch('/', { credentials: 'include' }).catch(() => {});

    const form = document.getElementById('login');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      msg.textContent = '';
      msg.className = 'msg';
      const body = new URLSearchParams(new FormData(form));
      const token = csrfToken();
      try {
        const r = await fetch('/api/v1/auth/login', {
          method: 'POST',
          body,
          credentials: 'include',
          headers: token ? { 'X-CSRF-Token': token } : {},
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || r.statusText);
        msg.className = 'msg ok';
        msg.textContent = 'Signed in as ' + data.username + ' — full inbox UI coming in P1';
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = err.message || 'Sign in failed';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
