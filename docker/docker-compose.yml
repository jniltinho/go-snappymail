services:
  mariadb:
    image: mariadb:10.11
    container_name: gosm-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - gosm
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASS}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postfixadmin:
    build:
      context: ./postfixadmin
      args:
        GO_POSTFIXADMIN_VERSION: "1.0.86"
    container_name: gosm-postfixadmin
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASS}
      DB_PASS: ${DB_PASS}
      SESSION_SECRET: ${SESSION_SECRET}
    networks:
      - gosm

  mailserver:
    build: ./mailserver
    container_name: gosm-mailserver
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      postfixadmin:
        condition: service_started
    ports:
      - "25:25"
      - "143:143"
      - "993:993"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      MAIL_FQDN: ${MAIL_FQDN}
      VMAIL_UID: ${VMAIL_UID}
      VMAIL_GID: ${VMAIL_GID}
    volumes:
      - vmail_data:/var/vmail
      - mail_ssl:/etc/ssl/mail
    networks:
      - gosm
    hostname: mail.test.local

  snappymail:
    image: ${SNAPPYMAIL_IMAGE}
    container_name: gosm-snappymail
    restart: unless-stopped
    depends_on:
      - mailserver
    ports:
      - "8888:8888"
    volumes:
      - snappymail_data:/var/lib/snappymail
    networks:
      - gosm

  go-cubemail:
    build:
      context: ./go-cubemail
      args:
        GO_CUBEMAIL_VERSION: ${GO_CUBEMAIL_VERSION}
    container_name: gosm-go-cubemail
    restart: unless-stopped
    depends_on:
      - mailserver
    ports:
      - "8080:8080"
    volumes:
      - cubemail_data:/app/data
    networks:
      - gosm

  go-snappymail:
    build:
      context: ..
      dockerfile: docker/go-snappymail/Dockerfile
    container_name: gosm-go-snappymail
    restart: unless-stopped
    depends_on:
      - mailserver
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      GOSM_SERVER_SECRET_KEY: ${SERVER_SECRET_KEY}
    volumes:
      - snappymail_go_data:/app/data
    networks:
      - gosm

networks:
  gosm:
    driver: bridge

volumes:
  mariadb_data:
  vmail_data:
  mail_ssl:
  snappymail_data:
  cubemail_data:
  snappymail_go_data:
